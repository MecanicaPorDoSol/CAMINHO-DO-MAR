<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caminho da Maré</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  color: white;
}

/* Fundo */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1550547660-d9450f859349') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
}

h1 {
  text-align: center;
  color: #ffcc00;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #25D366;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}

.menu {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay">
    <h1>🍔 CAMINHO DA MARÉ</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <select id="lanche">
      <option value="">Escolha seu lanche</option>
      <option value="X Burguer - R$16">X Burguer - R$16</option>
      <option value="X Salada - R$18">X Salada - R$18</option>
      <option value="X Coração - R$22">X Coração - R$22</option>
      <option value="X Calabresa - R$22">X Calabresa - R$22</option>
    </select>

    <select id="bebida">
      <option value="">Bebida (opcional)</option>
      <option value="Refrigerante Lata - R$6">Refrigerante Lata - R$6</option>
    </select>

    <button onclick="fazerPedido()">Fazer Pedido</button>

    <div class="menu">
      <p>X Burguer - R$16</p>
      <p>X Salada - R$18</p>
      <p>X Coração - R$22</p>
      <p>X Calabresa - R$22</p>
      <p>Refrigerante Lata - R$6</p>
    </div>

  </div>
</div>

<script>
function fazerPedido() {
  let nome = document.getElementById("nome").value;
  let lanche = document.getElementById("lanche").value;
  let bebida = document.getElementById("bebida").value;

  if(nome === "" || lanche === "") {
    alert("Preencha seu nome e escolha um lanche!");
    return;
  }

  let mensagem = `Olá, meu nome é ${nome}%0A`;
  mensagem += `Gostaria de pedir:%0A`;
  mensagem += `- ${lanche}%0A`;

  if(bebida !== "") {
    mensagem += `- ${bebida}%0A`;
  }

  mensagem += `%0AObrigado!`;

  let numero = "5548999367310";

  window.open(`https://wa.me/${numero}?text=${mensagem}`, "_blank");
}
</script>

</body>
</html>
