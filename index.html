<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caminho da Maré</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #111;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
  background: #000;
  color: #ffcc00;
  font-size: 24px;
  font-weight: bold;
}

/* Container */
.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

/* Card de produto */
.card {
  background: #1c1c1c;
  border-radius: 15px;
  margin-bottom: 15px;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: cover;
}

.info {
  flex: 1;
  padding: 10px;
}

.info h3 {
  font-size: 16px;
}

.info p {
  color: #ffcc00;
  margin-top: 5px;
}

/* Quantidade */
.controls {
  display: flex;
  align-items: center;
  gap: 5px;
}

.controls button {
  width: 30px;
  height: 30px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 18px;
  border-radius: 5px;
}

.controls span {
  width: 20px;
  text-align: center;
}

/* Total */
.total {
  text-align: center;
  font-size: 20px;
  margin: 15px 0;
  color: #ffcc00;
}

/* Botão */
.btn {
  width: 100%;
  padding: 15px;
  background: #25D366;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div class="header">🍔 CAMINHO DO MAR 🍔</div>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">

<!-- PRODUTOS -->

<div class="card">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6UkNVMnorZEjv-lTxrywdi9TkLXx9oLwfg6oDO8cN4w&s=10">
  <div class="info">
    <h3>X Burguer</h3>
    <p>R$16</p>
  </div>
  <div class="controls">
    <button onclick="menos('burguer')">-</button>
    <span id="burguer">0</span>
    <button onclick="mais('burguer')">+</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
  <div class="info">
    <h3>X Salada</h3>
    <p>R$18</p>
  </div>
  <div class="controls">
    <button onclick="menos('salada')">-</button>
    <span id="salada">0</span>
    <button onclick="mais('salada')">+</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
  <div class="info">
    <h3>X Coração</h3>
    <p>R$22</p>
  </div>
  <div class="controls">
    <button onclick="menos('coracao')">-</button>
    <span id="coracao">0</span>
    <button onclick="mais('coracao')">+</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
  <div class="info">
    <h3>X Calabresa</h3>
    <p>R$22</p>
  </div>
  <div class="controls">
    <button onclick="menos('calabresa')">-</button>
    <span id="calabresa">0</span>
    <button onclick="mais('calabresa')">+</button>
  </div>
</div>

<div class="card">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQCXERFPcciZAbN7I4SkzrlKpDvh7Ny_4IzuF_cAi2Wg&s=10">
    <h3>Coca Lata</h3>
    <p>R$6</p>
  </div>
  <div class="controls">
    <button onclick="menos('coca')">-</button>
    <span id="coca">0</span>
    <button onclick="mais('coca')">+</button>
  </div>
</div>
<div class="card">
  <div class="info">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR581g4IgoZACuLFLskrggT_jd2VymHWF6m1e4U7zo60Q&s=10">
    <h3>Guaraná Lata</h3>
    <p>R$6</p>
  </div>
  <div class="controls">
    <button onclick="menos('guarana')">-</button>
    <span id="guarana">0</span>
    <button onclick="mais('guarana')">+</button>
  </div>
</div>

<div class="total" id="total">Total: R$ 0</div>

<button class="btn" onclick="pedido()">Fazer Pedido</button>

</div>

<script>
let precos = {
  burguer: 16,
  salada: 18,
  coracao: 22,
  calabresa: 22,
  coca: 6,
  guarana: 6
};

function mais(id){
  let el = document.getElementById(id);
  el.innerText++;
  calcular();
}

function menos(id){
  let el = document.getElementById(id);
  if(el.innerText > 0) el.innerText--;
  calcular();
}

function calcular(){
  let total = 0;
  for(let item in precos){
    total += document.getElementById(item).innerText * precos[item];
  }
  document.getElementById("total").innerText = "Total: R$ " + total;
}

function pedido(){
  let nome = document.getElementById("nome").value;
  if(nome === ""){
    alert("Digite seu nome!");
    return;
  }

  let msg = `Olá, meu nome é ${nome}%0A%0APedido:%0A`;
  let total = 0;

  for(let item in precos){
    let qtd = document.getElementById(item).innerText;
    if(qtd > 0){
      msg += `- ${qtd}x ${item}%0A`;
      total += qtd * precos[item];
    }
  }

  if(total === 0){
    alert("Escolha algum item!");
    return;
  }

  msg += `%0ATotal: R$ ${total}`;

  window.open(`https://wa.me/5548999367310?text=${msg}`);
}
</script>

</body>
</html>
