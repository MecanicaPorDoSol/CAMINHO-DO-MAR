<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caminho da Maré</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  color: white;
}

/* Fundo */
.hero {
  min-height: 100vh;
  background: url('https://images.unsplash.com/photo-1550547660-d9450f859349') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.overlay {
  background: rgba(0,0,0,0.85);
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 420px;
}

h1 {
  text-align: center;
  color: #ffcc00;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* Itens */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
  background: #222;
  padding: 10px;
  border-radius: 8px;
}

.item span {
  font-size: 14px;
}

.item input {
  width: 60px;
  text-align: center;
}

/* Botão */
button {
  width: 100%;
  padding: 12px;
  background: #25D366;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.total {
  margin-top: 10px;
  font-size: 18px;
  text-align: center;
  color: #ffcc00;
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay">
    <h1>🍔 CAMINHO DA MARÉ</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <div class="item">
      <span>X Burguer (R$16)</span>
      <input type="number" id="burguer" min="0" value="0">
    </div>

    <div class="item">
      <span>X Salada (R$18)</span>
      <input type="number" id="salada" min="0" value="0">
    </div>

    <div class="item">
      <span>X Coração (R$22)</span>
      <input type="number" id="coracao" min="0" value="0">
    </div>

    <div class="item">
      <span>X Calabresa (R$22)</span>
      <input type="number" id="calabresa" min="0" value="0">
    </div>

    <div class="item">
      <span>Refrigerante Lata (R$6)</span>
      <input type="number" id="refri" min="0" value="0">
    </div>

    <div class="total" id="total">Total: R$ 0</div>

    <button onclick="fazerPedido()">Fazer Pedido</button>
  </div>
</div>

<script>
function calcularTotal() {
  let total =
    (document.getElementById("burguer").value * 16) +
    (document.getElementById("salada").value * 18) +
    (document.getElementById("coracao").value * 22) +
    (document.getElementById("calabresa").value * 22) +
    (document.getElementById("refri").value * 6);

  document.getElementById("total").innerText = "Total: R$ " + total;
}

// Atualiza automaticamente
document.querySelectorAll("input[type=number]").forEach(input => {
  input.addEventListener("input", calcularTotal);
});

function fazerPedido() {
  let nome = document.getElementById("nome").value;

  let b = document.getElementById("burguer").value;
  let s = document.getElementById("salada").value;
  let c = document.getElementById("coracao").value;
  let cal = document.getElementById("calabresa").value;
  let r = document.getElementById("refri").value;

  if(nome === "") {
    alert("Digite seu nome!");
    return;
  }

  let mensagem = `Olá, meu nome é ${nome}%0A%0APedido:%0A`;

  if(b > 0) mensagem += `- ${b}x X Burguer%0A`;
  if(s > 0) mensagem += `- ${s}x X Salada%0A`;
  if(c > 0) mensagem += `- ${c}x X Coração%0A`;
  if(cal > 0) mensagem += `- ${cal}x X Calabresa%0A`;
  if(r > 0) mensagem += `- ${r}x Refrigerante Lata%0A`;

  let total =
    (b * 16) + (s * 18) + (c * 22) + (cal * 22) + (r * 6);

  if(total === 0) {
    alert("Escolha pelo menos um item!");
    return;
  }

  mensagem += `%0ATotal: R$ ${total}`;

  let numero = "5548999367310";

  window.open(`https://wa.me/${numero}?text=${mensagem}`, "_blank");
}
</script>

</body>
</html>
